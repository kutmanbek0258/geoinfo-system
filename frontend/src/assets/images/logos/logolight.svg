<svg
        width="174"
        height="26"
        viewBox="0 0 174 26"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
>
    <defs>
        <!-- Градиент для океана (эффект объема/сферы) -->
        <radialGradient id="oceanGradient" cx="35%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#52B6F2"/>
            <stop offset="70%" stop-color="#2394E0"/>
            <stop offset="100%" stop-color="#106BA8"/>
        </radialGradient>

        <!-- Градиент для суши -->
        <linearGradient id="landGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#B6EE7B"/>
            <stop offset="100%" stop-color="#76C433"/>
        </linearGradient>

        <!-- Общая тень для объема глобуса -->
        <radialGradient id="globeShadow" cx="50%" cy="50%" r="50%">
            <stop offset="70%" stop-color="#000" stop-opacity="0"/>
            <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
        </radialGradient>
    </defs>

    <!-- Глобус -->
    <g>
        <!-- Основа: Океан -->
        <circle cx="13" cy="13" r="12" fill="url(#oceanGradient)"/>

        <!-- Сетка координат (меридианы и параллели) -->
        <path d="M 2 10 Q 13 12 24 10" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.25" fill="none"/>
        <path d="M 2 17 Q 13 19 24 17" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.25" fill="none"/>
        <path d="M 13 1 A 11 12 0 0 0 13 25" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.25" fill="none"/>
        <path d="M 13 1 A 6 12 0 0 0 13 25" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.2" fill="none"/>
        <path d="M 13 1 A 6 12 0 0 1 13 25" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.2" fill="none"/>

        <!-- ЕВРАЗИЯ (прорисована с севера на юг) -->
        <path
                d="M 5 6
           C 5.5 5, 7 4, 9 4.5
           C 11 4.2, 13 3.5, 16 3.5
           C 19 3.5, 22 5, 23 7
           C 24 8.5, 24.5 11, 23.5 12.5
           C 22.5 14, 21 14.5, 20 15.5
           C 19 16.5, 19.5 18, 18.5 18.5
           C 18 19, 17 17.5, 16.5 16.5
           C 16 15.5, 15 17.5, 14.5 18
           C 14 18.5, 13.5 17, 13.5 15.5
           C 13.5 14, 12 14.5, 11 14
           C 9.5 13.5, 10 12, 8.5 11.5
           C 7.5 11, 6.5 12, 5.5 10
           C 4.5 8.5, 4.5 7, 5 6 Z"
                fill="url(#landGradient)"
        />

        <!-- Часть Африки (на юго-западе для контекста) -->
        <path
                d="M 3.5 12
           C 5 12, 6.5 13, 7 14.5
           C 7.5 16, 6 19, 5 21
           C 4.2 21.5, 3 19, 2.2 17
           C 1.8 15.5, 2.5 13, 3.5 12 Z"
                fill="url(#landGradient)"
        />

        <!-- Британские острова и Япония (микро-острова для детализации) -->
        <circle cx="3.5" cy="6.5" r="0.6" fill="url(#landGradient)" />
        <path d="M 24 13 L 24.5 15" stroke="#B6EE7B" stroke-width="0.6" stroke-linecap="round"/>

        <!-- Наложение сферической тени -->
        <circle cx="13" cy="13" r="12" fill="url(#globeShadow)"/>
    </g>

    <!-- Текст -->
    <text
            x="34"
            y="18"
            font-family="Arial, Helvetica, sans-serif"
            font-size="14"
            font-weight="700"
    >
        <tspan fill="#2394E0">GeoInfo</tspan>
        <tspan fill="#76C433">Systems</tspan>
    </text>
</svg>
