version: '3.8'

services:
  # ====== Databases (оставлены без изменений) ======
  postgres-auth:
    networks:
      - prod-net

  redis-auth:
    networks:
      - prod-net

  postgres-geodata:
    networks:
      - prod-net

  postgres-docs:
    networks:
      - prod-net

  postgres-geoabstraction:
    networks:
      - prod-net

  postgres-geoprint:
    networks:
      - prod-net

  # ====== Message Broker ======
  kafka:
    depends_on:
      - zookeeper
    networks:
      - prod-net

  zookeeper:
    networks:
      - prod-net

  # ====== Elasticsearch for Search Service ======
  elasticsearch:
    networks:
      - prod-net

  # ====== TITILER ======
  titiler:
    networks:
      - prod-net

  # ======= MINIO STORAGE ======
  minio:
    networks:
      - prod-net

  # ====== ONLYOFFICE DOC SERVER ======
  onlyoffice-doc-server:
    networks:
      - prod-net

  # ====== MediaMTX Stream Server ======
  mediamtx:
    ports:
      - "${MEDIAMTX_HLS_PORT:-8888}:8888"
    networks:
      - prod-net

  pg_tileserv:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    networks:
      - prod-net

  # ====== Config, Discovery, Gateway ======
  config-server:
    networks:
      - prod-net

  discovery-server:
    networks:
      - prod-net

  api-gateway:
    networks:
      - prod-net

  # ====== Microservices ======
  auth-service:
    networks:
      - prod-net

  geodata-service:
    networks:
      - prod-net

  document-service:
    networks:
      - prod-net

  geoabstraction-service:
    networks:
      - prod-net

  geoprint-service:
    networks:
      - prod-net

  geoprint-worker:
    networks:
      - prod-net

  terrain-worker:
    networks:
      - prod-net

  geoabstract-worker:
    networks:
      - prod-net

  geoanalysis-worker:
    networks:
      - prod-net

  search-service:
    networks:
      - prod-net

  stream-service:
    networks:
      - prod-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - prod-net

  nginx-proxy:
    build:
      context: ./nginx-proxy
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - prod-net

networks:
  prod-net:
    driver: bridge
