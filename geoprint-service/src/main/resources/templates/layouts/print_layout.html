<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style th:inline="css">
        @page {
            size: [(${pageSize})] [(${orientation})];
            margin: 5mm; /* Рамка 5мм от края листа */
        }
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'DejaVu Sans', sans-serif;
            background-color: #fff;
        }

        /* Основная рамка */
        .drawing-frame {
            position: relative;
            width: 100%;
            height: 100%;
            border: 0.5mm solid #000;
            overflow: hidden;
        }

        /* Контейнер для изображения карты */
        .map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .map-img {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Дата генерации в углу */
        .generation-date {
            position: absolute;
            bottom: 2mm;
            right: 2mm;
            background-color: #ffffff; /* Заменяем rgba на hex */
            padding: 1mm 2mm;
            border: 0.2mm solid #333;
            font-size: 8pt;
            color: #000;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="drawing-frame">
        <div class="map-container">
            <img class="map-img" th:src="${mapImageBase64}" />
        </div>
        
        <div class="generation-date">
            Дата: <span th:text="${#dates.format(#dates.createNow(), 'dd.MM.yyyy HH:mm')}"></span>
        </div>
    </div>
</body>
</html>
