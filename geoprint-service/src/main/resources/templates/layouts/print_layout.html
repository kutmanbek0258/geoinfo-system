<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page {
            size: A4 landscape;
            margin: 10mm;
        }
        body {
            font-family: 'DejaVu Sans', sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            height: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 10px;
        }
        .map-frame {
            width: 100%;
            height: 700px;
            border: 2px solid #333;
            text-align: center;
            overflow: hidden;
        }
        .map-img {
            max-width: 100%;
            max-height: 100%;
        }
        .stamp-table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }
        .stamp-table td {
            border: 1px solid #000;
            padding: 8px;
            font-size: 12px;
        }
        .footer {
            margin-top: 10px;
            font-size: 10px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 th:text="${attributes.title}">Геопространственный отчет</h1>
        </div>
        
        <div class="map-frame">
            <img class="map-img" th:src="${mapImageBase64}" />
        </div>
        
        <table class="stamp-table">
            <tr>
                <td style="width: 20%; font-weight: bold;">Разработал:</td>
                <td style="width: 30%;" th:text="${attributes.author}">Система</td>
                <td style="width: 20%; font-weight: bold;">Организация:</td>
                <td style="width: 30%;" th:text="${attributes.organization}">ГеоИнфоСистема</td>
            </tr>
            <tr>
                <td style="font-weight: bold;">Дата создания:</td>
                <td th:text="${#dates.format(#dates.createNow(), 'dd.MM.yyyy HH:mm')}"></td>
                <td style="font-weight: bold;">Масштаб:</td>
                <td>Указан в ГИС</td>
            </tr>
        </table>
        
        <div class="footer">
            Сгенерировано автоматически модулем GeoPrint
        </div>
    </div>
</body>
</html>
